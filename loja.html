<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CT Tsutake</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="/assets/img/loho.jpg" alt="Logo CT Tsutake">
            </div>
            <div class="titulo-loja">
                <h1><center>Loja Oficial CT Tsutake</center></h1>
        </nav>
    </header>

    <main>

        <section class="loja-container">
            <h2 class="titulo-secao">Roupas e acessórios <span> Oficiais</span></h2>

            <div class="produtos-grid">
                <div class="produto-card">
                    <img src="assets/img/camisapreta.jpeg" alt="Camiseta Oversized Preta">
                    <h3>Camiseta Oversized Preta</h3>   
                    <p class="preco">R$ 79,90</p>
                    <button class="btn-comprar">Adicionar ao carrinho</button>
                </div>

                <div class="produto-card">
                    <img src="assets/img/camisacinza.jpeg" alt="Camiseta Oversized Cinza">
                    <h3>Camiseta Oversized Cinza</h3>   
                    <p class="preco">R$ 79,90</p>
                    <button class="btn-comprar">Adicionar ao carrinho</button>
                </div>

                <div class="produto-card">
                    <img src="assets/img/camisapreta.jpeg" alt="Camiseta Oversized Vermelha">
                    <h3>Camiseta Oversized Vermelha</h3>   
                    <p class="preco">R$ 79,90</p>
                    <button class="btn-comprar">Adicionar ao carrinho</button>
                </div>

                <div class="produto-card">
                    <div class="tag-desconto">10% OFF</div>
                    <img src="assets/img/murph.jpeg" alt="Regata Murph 2026">
                    <h3>Regata Murph 2026</h3>   
                    <p class="preco">R$ 50,00</p>
                    <button class="btn-comprar">Adicionar ao carrinho</button>
                </div>
            </div>
        </section>
